# Workflow for regenerating the consolidated module-index JSON files
# (modules.json, bicep.json, terraform.json) under docs/static/module-indexes/.
#
# Runs on:
#   * push to main when the source CSVs, the generator script, the shared
#     PR helper or this workflow change
#   * workflow_dispatch (manual escape hatch)
#
# On any detected diff the workflow creates a branch, opens a PR with the
# AVM GitHub App and merges it immediately (squash + branch delete).
name: ".Platform: Update module indexes JSON"

on:
  push:
    branches:
      - main
    paths:
      - 'docs/static/module-indexes/*.csv'
      - 'utilities/tools/platform/Set-ModuleIndexesJson.ps1'
      - 'utilities/pipelines/sharedScripts/New-AutoMergePullRequest.ps1'
      - '.github/workflows/platform.updateModuleIndexesJson.yml'
  workflow_dispatch: {}

env:
  branch_prefix: "update-module-indexes-json"
  pr_title: "Update module indexes JSON (automated)"
  pr_body: |
    This is an automated `pull_request` containing updates to the consolidated module-index JSON files stored under `docs/static/module-indexes/`:

    * `modules.json` - merged Bicep + Terraform module data (resource modules matched on `ProviderNamespace`+`ResourceType`).
    * `bicep.json` - minimal Bicep data set consumed by the Bicep VS Code intellisense extension.
    * `terraform.json` - Terraform equivalent.

    The files are generated by `utilities/tools/platform/Set-ModuleIndexesJson.ps1` from the CSV indexes in the same folder.

    Files updated in this PR:

    {{CHANGED_FILES}}

    This PR will be auto-merged.

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

concurrency:
  group: update-module-indexes-json
  cancel-in-progress: false

jobs:
  update_module_indexes_json:
    name: Update module indexes JSON
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: platform
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.AVM_APP_CLIENT_ID }}
          private-key: ${{ secrets.AVM_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Configure local git as the GitHub App
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          $userId = gh api "/users/$env:APP_SLUG[bot]" --jq .id
          git config --global user.name  "$env:APP_SLUG[bot]"
          git config --global user.email "$userId+$env:APP_SLUG[bot]@users.noreply.github.com"

      - name: Generate module-index JSON files
        run: |
          . (Join-Path $env:GITHUB_WORKSPACE 'utilities' 'tools' 'platform' 'Set-ModuleIndexesJson.ps1')
          Set-ModuleIndexesJson -ModuleIndexesFolderPath (Join-Path $env:GITHUB_WORKSPACE 'docs' 'static' 'module-indexes') -Verbose

      - name: Open PR and merge (only if files changed)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # PR body is passed via env so the multiline YAML value (including the
          # {{CHANGED_FILES}} token) is preserved verbatim.
          PR_BODY_TEMPLATE: ${{ env.pr_body }}
        run: |
          . (Join-Path $env:GITHUB_WORKSPACE 'utilities' 'pipelines' 'sharedScripts' 'New-AutoMergePullRequest.ps1')

          $targetFiles = @(
            'docs/static/module-indexes/modules.json',
            'docs/static/module-indexes/bicep.json',
            'docs/static/module-indexes/terraform.json'
          )

          New-AutoMergePullRequest `
              -FilePath     $targetFiles `
              -BranchPrefix '${{ env.branch_prefix }}' `
              -Title        '${{ env.pr_title }}' `
              -Body         $env:PR_BODY_TEMPLATE `
              -Admin
